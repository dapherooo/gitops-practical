# ============================================================
# SETUP GITOPS - NGINX & APACHE DENGAN CONFIGMAP
# ============================================================
# Ini setup buat ngereplace index.html dari ConfigMap
# ConfigMap = tempat nyimpen data yang bisa di-mount ke pod
# 
# Port yang digunakan:
# - NGINX: 80 (di dalam pod) -> /usr/share/nginx/html/index.html
# - APACHE: 80 (di dalam pod) -> /usr/local/apache2/htdocs/index.html
#
# Cara kerjanya:
# 1. ConfigMap dibuat berisi teks "Ini tampilan dari NGINX/HTTPD"
# 2. Pod mount ConfigMap ke document root
# 3. Ketika akses web, langsung return isi dari ConfigMap
# 4. Ganti ConfigMap = pod otomatis update (rolling update)
# ============================================================

# ===== CONFIG UNTUK NGINX =====
# Ini tempat nyimpen file index.html yang bakal ditampilkan di browser
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: default
data:
  index.html: |
    Ini tampilan dari NGINX dan nama saya dahnur
---
# ===== JALANKAN NGINX =====
# Ini yang bikin pod nginx jalan
# Replicas: 2 = buat 2 pod nginx biar fault tolerant (kalo 1 rusak, masih ada 1)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-nginx
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-nginx
  template:
    metadata:
      labels:
        app: simple-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:stable
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-html
          mountPath: /usr/share/nginx/html  # Lokasi document root nginx
      volumes:
      - name: nginx-html
        configMap:
          name: nginx-config  # Ambil isi dari ConfigMap ini
          items:
          - key: index.html   # Key dari ConfigMap
            path: index.html  # Nama file di document root
---
# ===== SERVICE NGINX =====
# Ini yang expose nginx agar bisa diakses dari mana-mana
# Tipe ClusterIP = bisa diakses dalam cluster
apiVersion: v1
kind: Service
metadata:
  name: simple-nginx
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: simple-nginx
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
# ===== CONFIG UNTUK HTTPD (APACHE) =====
# Sama kayak nginx, ini nyimpen index.html untuk apache
apiVersion: v1
kind: ConfigMap
metadata:
  name: httpd-config
  namespace: default
data:
  index.html: |
    Ini tampilan dari HTTPD dan nama saya dahnur
---
# ===== JALANKAN APACHE HTTPD =====
# Ini yang bikin pod apache jalan
# Same thing like nginx, 2 replicas untuk high availability
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-httpd
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-httpd
  template:
    metadata:
      labels:
        app: simple-httpd
    spec:
      containers:
      - name: httpd
        image: httpd:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: httpd-html
          mountPath: /usr/local/apache2/htdocs  # Lokasi document root apache
      volumes:
      - name: httpd-html
        configMap:
          name: httpd-config  # Ambil isi dari ConfigMap ini
          items:
          - key: index.html   # Key dari ConfigMap
            path: index.html  # Nama file di document root
---
# ===== SERVICE APACHE HTTPD =====
# Ini yang expose apache agar bisa diakses
apiVersion: v1
kind: Service
metadata:
  name: simple-httpd
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: simple-httpd
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80

